  # ===========================================================
  # Tool-ranking observation (ordinal_match)
  # ===========================================================

  - id: rustims-fdr-tool-ordering-hla-10k
    kind: third_party_observation
    tier: research
    title: Tool FDR ordering on HLA-I 10k
    claim: |
      On rustims-simulated HLA-I 10k data, the empirical real
      FDR ordering across tools is FragPipe < PEAKS-XPro
      (lower-is-better). MaxQuant excluded — not separately
      reported in the source span at this granularity.
    observation:
      third_party_tool: "FragPipe, PEAKS-XPro"
      metric_definition: |
        Real FDR per the per-tool claims above; ordering is the
        load-bearing property when individual cell values shift
        slightly.
      pattern:
        pattern_kind: ordinal_match
        entity_to_path:
          FragPipe: fragpipe.hla_10k.real_fdr_pct
          PEAKS_XPro: peaks_xpro.hla_10k.real_fdr_pct
        direction: lower_is_better
        tie_policy: adjacent_swap_ok
        observed_value:
          FragPipe: 0.91
          PEAKS_XPro: 1.8
      paper_locator: page-9, line 237
    provenance:
      kind: extracted-from-paper
      source_id: preprint:rustims-v1-covered-6dadf069
    evidence:
