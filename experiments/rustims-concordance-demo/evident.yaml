version: 0.1
project: rustims-observation-demo

# Hand-authored third_party_observation manifest for the rustims
# main preprint. Demonstrates the end-to-end pipeline:
#   evident.yaml (this file)
#   + a docker image that emits artifacts/observations.json
#   + evident_agent.concordance.evaluate() for each claim
#   + typed-trust --last-concorded-sidecar
#   → rendered "## Observation result" verdicts
#
# Each claim is a per-cell observation; the 7 raw model-proposed
# candidates from PR #33 were split into 9 per-cell claims +
# 1 ordinal_match claim (10 total).
#
# Epsilon choices are illustrative, not adjudicated by the paper
# author yet.

claims:

  # ===========================================================
  # MaxQuant
  # ===========================================================

  - id: rustims-maxquant-peak-matching-7p5min-150k
    kind: third_party_observation
    tier: research
    title: |
      MaxQuant peak matching error reaches up to 30% in 7.5min
      150,000-peptide setup
    claim: |
      On rustims-simulated 7.5 min, 150,000-peptide dda-PASEF
      data, MaxQuant's peak matching error rate reached up to
      30%.
    observation:
      third_party_tool: MaxQuant
      metric_definition: |
        MaxQuant peak matching error rate per Cox 2008 §Methods —
        fraction of MS1 alignment peaks MaxQuant failed to bind
        to a precursor, expressed as a percentage of total peaks
        examined.
      pattern:
        pattern_kind: numeric_band
        metric_path: maxquant.peak_matching_error.fraction_pct_7p5min_150k
        epsilon: 5.0
        observed_value: 30.0
      paper_locator: page-6, lines 100-101
    provenance:
      kind: extracted-from-paper
      source_id: preprint:rustims-v1-covered-6dadf069
    evidence:
      command: evident-replay maxquant-peak-matching-7p5min-150k
      artifact: artifacts/observations.json
      artifact_schema_version: "1"
      replay_status: available
      docker_image: ghcr.io/theGreatHerrLebert/rustims-experiments@sha256:placeholder

  # ===========================================================
  # PEAKS-XPro real FDR on HLA-I
  # ===========================================================

  - id: rustims-peaks-xpro-fdr-hla-10k
    kind: third_party_observation
    tier: research
    title: PEAKS-XPro real FDR on HLA-I 10k
    claim: |
      On the rustims-simulated HLA-I 10k thunder-dda-PASEF
      dataset, PEAKS-XPro's empirical real FDR was 1.8%.
    observation:
      third_party_tool: PEAKS-XPro
      metric_definition: |
        Empirical true FDR (rustims §Methods): fraction of
        peptide identifications labeled positive by PEAKS-XPro
        at q ≤ 0.01 that were not in the gold-standard set.
      pattern:
        pattern_kind: numeric_band
        metric_path: peaks_xpro.hla_10k.real_fdr_pct
        epsilon: 0.5
        observed_value: 1.8
      paper_locator: page-9, line 237
    provenance:
      kind: extracted-from-paper
      source_id: preprint:rustims-v1-covered-6dadf069
    evidence:
      command: evident-replay peaks-xpro-fdr-hla-10k
      artifact: artifacts/observations.json
      artifact_schema_version: "1"
      replay_status: available
      docker_image: ghcr.io/theGreatHerrLebert/rustims-experiments@sha256:placeholder

